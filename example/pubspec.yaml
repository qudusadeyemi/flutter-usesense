name: usesense_flutter_example
description: Demonstrates the UseSense Flutter plugin.
publish_to: none

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  usesense_flutter:
    path: ../
  # Persists the user-entered API key across launches, matching the
  # iOS example's @AppStorage and Android example's SharedPreferences
  # pattern. Only the example app needs this dep; the plugin itself
  # has no runtime state to persist.
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
