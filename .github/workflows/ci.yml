name: CI

on:
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install plugin dependencies
        run: flutter pub get

      - name: Verify pub publish shape (dry run)
        # Catches publishing-time issues (missing fields, ignored files,
        # analysis errors in lib/) on every PR so the release workflow
        # doesn't fail at tag time.
        run: flutter pub publish --dry-run

      - name: Format check
        # `dart format --set-exit-if-changed` fails the build if any
        # file would be reformatted. This keeps the baseline consistent
        # without requiring maintainers to run a formatter pre-commit.
        run: dart format --set-exit-if-changed .

      - name: Static analysis
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Unit tests
        run: flutter test

      - name: Install example dependencies
        run: flutter pub get
        working-directory: example

      - name: Analyze example
        run: flutter analyze
        working-directory: example

  build-ios:
    name: Build iOS Example
    # Compiles the example app (and therefore the plugin's iOS bridge,
    # ios/Classes/UseSenseFlowsBridge.swift) against the real UseSenseSDK pod.
    # `flutter analyze` only checks Dart, so without this an iOS Swift bug
    # (e.g. a signature mismatch with UseSenseFlows.run) ships undetected.
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Regenerate the example's iOS platform + set deployment target
        # example/ios is gitignored (example/.gitignore), so the Runner project and
        # Podfile are not committed -- regenerate them. flutter create scaffolds a
        # lower default iOS target, but the plugin podspec requires iOS 16.0, so set
        # the Podfile platform before pod install (otherwise pod install fails with a
        # deployment-target mismatch). --config-only generates the Podfile + xcconfig
        # without compiling; the next step then builds (pod install resolves the
        # UseSenseSDK ~> 4.x pin fresh from CocoaPods, no committed lock to drift).
        working-directory: example
        run: |
          flutter create --platforms=ios .
          flutter pub get
          # --config-only generates the Podfile but also runs pod install, which fails
          # on the default low platform. Tolerate that (|| true) -- the Podfile is
          # written before the failure -- then pin the platform so the REAL build below
          # resolves. Pods read the Podfile platform; the Runner app target reads its
          # own IPHONEOS_DEPLOYMENT_TARGET in the xcodeproj, so set BOTH to 16.0.
          flutter build ios --no-codesign --config-only || true
          sed -i '' "s/# *platform :ios.*/platform :ios, '16.0'/" ios/Podfile
          # UseSenseSDK vendors a static xcframework (MediaPipe), which Flutter's
          # default dynamic use_frameworks! rejects. Force static linkage (matches
          # the maintained example Podfile).
          sed -i '' "s/use_frameworks!.*/use_frameworks! :linkage => :static/" ios/Podfile
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g" ios/Runner.xcodeproj/project.pbxproj

      - name: Build iOS example
        run: flutter build ios --no-codesign --debug
        working-directory: example

  build-android:
    name: Build Android Example (release)
    # Compiles the example app (and therefore the plugin's Android module,
    # :usesense_flutter) in the RELEASE variant. This is the guard for the class
    # of failure fixed in 2.4.2: android/build.gradle.kts must not hardcode a
    # Flutter engine hash (io.flutter:flutter_embedding_*:1.0.0-<hash>). A pinned
    # hash resolves against the CI runner's own Flutter engine and fails with
    # "inconsistent module metadata found ... bad version", and a pinned debug
    # variant leaks into release. `flutter analyze` is Dart-only and can't catch
    # this -- only a real Android compile does. Release specifically, because the
    # original break was on :usesense_flutter:compileReleaseKotlin.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        # The plugin's android module targets Java 17 (source/targetCompatibility
        # VERSION_17). Pin the JDK so the AGP toolchain is deterministic rather
        # than relying on whatever the runner image defaults to.
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Regenerate the example's Android platform
        # example/android is gitignored (example/.gitignore), so the Gradle
        # project is not committed -- regenerate it. The generated release
        # buildType signs with the debug keys (flutter create's default), so no
        # keystore is needed to exercise the release compile.
        #
        # Force the app minSdk to 28: the native ai.usesense:sdk requires
        # minSdk 28, so a consuming app on flutter's lower default fails the
        # release manifest merge ("uses-sdk:minSdkVersion 24 cannot be smaller
        # than version 28 declared in library [ai.usesense:sdk]"). Integrators
        # must do the same in their own app/build.gradle -- this mirrors that.
        working-directory: example
        run: |
          flutter create --platforms=android .
          flutter pub get
          sed -i -E 's/minSdk(Version)? *=? *[a-zA-Z0-9_.().]+/minSdk = 28/' android/app/build.gradle.kts

      - name: Build Android example (release)
        run: flutter build apk --release
        working-directory: example
