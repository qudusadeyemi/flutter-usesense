name: CI

on:
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install plugin dependencies
        run: flutter pub get

      - name: Verify pub publish shape (dry run)
        # Catches publishing-time issues (missing fields, ignored files,
        # analysis errors in lib/) on every PR so the release workflow
        # doesn't fail at tag time.
        run: flutter pub publish --dry-run

      - name: Format check
        # `dart format --set-exit-if-changed` fails the build if any
        # file would be reformatted. This keeps the baseline consistent
        # without requiring maintainers to run a formatter pre-commit.
        run: dart format --set-exit-if-changed .

      - name: Static analysis
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Unit tests
        run: flutter test

      - name: Install example dependencies
        run: flutter pub get
        working-directory: example

      - name: Analyze example
        run: flutter analyze
        working-directory: example

  build-ios:
    name: Build iOS Example
    # Compiles the example app (and therefore the plugin's iOS bridge,
    # ios/Classes/UseSenseFlowsBridge.swift) against the real UseSenseSDK pod.
    # `flutter analyze` only checks Dart, so without this an iOS Swift bug
    # (e.g. a signature mismatch with UseSenseFlows.run) ships undetected.
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Regenerate the example's iOS platform
        # example/ios is gitignored (example/.gitignore), so the Runner project and
        # Podfile are not committed -- regenerate them. `flutter build ios` then runs
        # pod install, resolving the plugin's UseSenseSDK `~> 4.x` pin fresh from
        # CocoaPods (no committed lock to drift).
        run: flutter create --platforms=ios .
        working-directory: example

      - name: Build iOS example
        run: flutter build ios --no-codesign --debug
        working-directory: example
